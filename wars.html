<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resilience war room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#14130f; --panel:#1d1b16; --panel-2:#232019; --line:#332f26;
    --text:#f1ede4; --muted:#988f7c; --faint:#6b6353;
    --gold:#ffd700; --win:#5fb87a; --loss:#d8584e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  a:hover{text-decoration:underline}
  .mono{font-family:'JetBrains Mono',monospace}

  .topbar{position:sticky;top:0;z-index:6;background:var(--ink)}
  header.top{border-bottom:1px solid var(--line);padding:22px 32px 18px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .brand{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;letter-spacing:.04em;text-transform:uppercase;margin:0}
  .brand b{color:var(--gold)}
  .crumb{color:var(--muted);font-size:13px}
  .gen{margin-left:auto;color:var(--faint);font-size:12px}

  nav.tabs{display:flex;gap:4px;padding:0 32px;border-bottom:1px solid var(--line);background:var(--ink);z-index:5}
  nav.tabs button{background:none;border:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:17px;letter-spacing:.05em;text-transform:uppercase;padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent}
  nav.tabs button:hover{color:var(--text)}
  nav.tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}

  main{padding:24px 32px 80px}
  section.view{display:none}
  section.view.active{display:block}

  .grid{display:grid;gap:16px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(165px,1fr));margin-bottom:8px}
  .charts{grid-template-columns:repeat(2,1fr)}
  .charts .wide{grid-column:1 / -1}
  @media(max-width:900px){.charts{grid-template-columns:1fr}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px 18px 16px}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
  .card .value{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;line-height:1.05;margin-top:6px}
  .card .value.gold{color:var(--gold)}
  .card .sub{color:var(--faint);font-size:12px;margin-top:3px}
  .card .sub b{color:var(--muted);font-weight:600}

  .panel h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:19px;letter-spacing:.03em;text-transform:uppercase;margin:0 0 2px}
  .panel .cap{color:var(--muted);font-size:12.5px;margin:0 0 14px}
  .chartbox{position:relative;height:240px}

  .controls{display:flex;gap:10px;align-items:center;margin:0 0 12px;flex-wrap:wrap}
  .controls label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  .controls input[type=number],.controls select{background:var(--ink);border:1px solid var(--line);color:var(--text);border-radius:5px;padding:6px 8px;font-family:'JetBrains Mono',monospace}
  .controls input[type=number]{width:84px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .seg button{background:var(--ink);border:none;color:var(--muted);padding:6px 12px;cursor:pointer;font-size:13px}
  .seg button.on{background:var(--gold);color:#1a1814;font-weight:600}

  .legend{display:flex;gap:16px;align-items:center;margin:0 0 12px;font-size:12.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:13px;height:13px;border-radius:3px;display:inline-block}
  .sw.win{background:var(--win)} .sw.loss{background:var(--loss)}

  .form-strip{display:flex;flex-wrap:wrap;gap:4px}
  .form-cell{width:17px;height:26px;border-radius:3px;cursor:pointer;transition:transform .08s}
  .form-cell:hover{transform:translateY(-2px)}
  .form-cell.w{background:var(--win)} .form-cell.l{background:var(--loss)}
  .form-cell.opt{opacity:.45;outline:1px dashed var(--faint);outline-offset:-1px}
  .sw.opt{background:transparent;border:1px dashed var(--faint)}
  .wtag{font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:4px}
  .wtag.mand{background:#2a2a1a;color:var(--gold);border:1px solid #4a4420}
  .wtag.opt{background:transparent;color:var(--muted);border:1px dashed var(--faint)}

  .strip-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
  .pcell{width:14px;height:22px;border-radius:2px;border:1px solid var(--line);background:transparent}
  .pcell.on{background:var(--gold);border-color:var(--gold)}

  table.board{width:100%;border-collapse:collapse;font-size:13.5px}
  table.board th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;border-bottom:1px solid var(--line)}
  table.board td{padding:7px 10px;border-bottom:1px solid #26241d}
  table.board td.num,table.board th.num{text-align:right;font-family:'JetBrains Mono',monospace}
  table.board tr:hover td{background:var(--panel-2)}
  .rank{color:var(--faint);font-family:'Barlow Condensed',sans-serif;font-weight:700;width:30px}
  .pname{cursor:pointer}
  .pname:hover{color:var(--gold)}
  .leaver{color:var(--muted)}
  .leaver::after{content:' *';color:var(--faint)}
  .below{color:var(--loss)}

  .slack-wrap{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .slack-table{flex:1 1 360px;min-width:320px}
  .slack-quad{flex:1 1 380px;min-width:320px}

  .board-scroll{max-height:360px;overflow-y:auto;border-radius:6px}
  .board-scroll table.board th{position:sticky;top:0;background:var(--panel);z-index:1}

  .note{color:var(--faint);font-size:12px;margin-top:10px}
  .note.click{cursor:pointer}
  .note.click:hover{color:var(--muted)}

  .lookup{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .lookup input{flex:1;min-width:220px;max-width:340px;background:var(--ink);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:10px 12px;font-size:14px}
  .results{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .results button{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:5px;padding:6px 11px;cursor:pointer;font-size:13px}
  .results button:hover{border-color:var(--gold)}

  .player-head,.war-head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .player-head .pn,.war-head .wn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px}
  .player-head .meta,.war-head .meta{color:var(--muted);font-size:13px}
  .war-head .res{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px}
  .war-head .res.w{color:var(--win)} .war-head .res.l{color:var(--loss)}

  .empty{color:var(--muted);padding:40px 0;text-align:center}
  .loader-box{border:1px dashed var(--line);border-radius:8px;padding:28px;text-align:center;color:var(--muted)}
  .hidden{display:none !important}

  #floatTip{position:fixed;pointer-events:none;background:#0c0b08;border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:12.5px;color:var(--text);z-index:50;opacity:0;transition:opacity .08s;max-width:240px}
  #floatTip .t{color:var(--muted);font-size:11px}

  .unlock-btn{background:var(--gold);color:#1a1814;border:none;font-weight:600;padding:9px 18px;border-radius:6px;cursor:pointer;font-size:14px}
  .unlock-btn:hover{filter:brightness(1.05)}
  .manage-list{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .manage-row{display:grid;grid-template-columns:1fr 70px 150px;align-items:center;gap:12px;padding:8px 6px;border-bottom:1px solid #26241d}
  .ml-name{font-size:14px}
  .ml-res{font-size:13px;color:var(--muted)}
  .toggle{display:inline-flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;padding:0;justify-self:end}
  .toggle .knob{width:38px;height:22px;border-radius:11px;background:#3a362b;position:relative;transition:background .15s}
  .toggle .knob::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#8a8170;transition:transform .15s}
  .toggle.on .knob{background:var(--gold)}
  .toggle.on .knob::after{transform:translateX(16px);background:#1a1814}
  .toggle .tlabel{font-size:12px;color:var(--muted);width:74px;text-align:left}
  .toggle.on .tlabel{color:var(--gold)}
  .signout{font-size:12px;color:var(--muted);cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0;margin-left:10px}
  .signout:hover{color:var(--gold)}
  .modeswitch{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-left:auto}
  .modeswitch button{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;padding:5px 12px;cursor:pointer}
  .modeswitch button.on{background:var(--gold);color:#1a1814;font-weight:600}
  .modeswitch button:not(.on):hover{color:var(--text)}
</style>
</head>
<body>

<div class="topbar">
<header class="top">
  <h1 class="brand">Resilience <b>war room</b></h1>
  <span class="crumb"><a href="https://resilience.systoned.cc/index.html">&larr; Resilience dashboard</a></span>
  <span class="gen" id="genStamp"></span>
</header>

<nav class="tabs">
  <button data-tab="overview" class="active">Overview</button>
  <button data-tab="wars">Wars</button>
  <button data-tab="players">Player lookup</button>
  <button data-tab="manage">Manage wars</button>
</nav>
</div>

<main>
  <div id="bootstrap" class="loader-box"><div id="bootMsg">Loading current war data &hellip;</div></div>
  <section class="view active" id="view-overview" data-view></section>
  <section class="view" id="view-wars" data-view></section>
  <section class="view" id="view-players" data-view></section>
  <section class="view" id="view-manage" data-view></section>
</main>

<div id="floatTip"></div>

<script>
"use strict";

/* Paste your Apps Script web app URL here (Deploy > Web app).
   Leave as-is to fall back to a local resilience-wars.json for preview. */
var DATA_URL = "https://script.google.com/macros/s/AKfycbwIL60E_q7Qtv9AAXJk9FxvU4Wbq6JyI63M9xFNXA9w8wnx4pZNx0Vbg6L7KdmhEe-Mgw/exec";

var DATA=null, ALL_WARS=[], WARS=[], MAND_WARS=[], PLAYERS={}, MAND_PLAYERS={}, CURRENT_IDS={}, charts={}, OPEN_PID=null, PLAYER_MODE='all';

/* ---------- loading ---------- */
function boot(){
  var url=(DATA_URL&&DATA_URL.indexOf('http')===0)?DATA_URL:'./resilience-wars.json';
  fetch(url,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('http');return r.json();})
    .then(function(j){ingest(j);})
    .catch(function(){document.getElementById('bootMsg').textContent='Could not reach the data source.';});
}

function ingest(payload){
  DATA=payload;
  ALL_WARS=(payload.wars||[]).slice().sort(function(a,b){return (a.start||a.warId)-(b.start||b.warId);});
  ALL_WARS.forEach(function(w){w._mandatory=(w.mandatory!==false);});
  document.getElementById('bootstrap').classList.add('hidden');
  if(payload.generated){
    document.getElementById('genStamp').textContent='Updated '+new Date(payload.generated*1000).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }
  computeCurrentRoster();
  buildPlayerLookup();
  buildManage();
  applyMode();
}

/* Recompute for the chosen mode, then re-render. War-level fields and the
   historical charts always use every war. Accountability always uses mandatory
   wars. The toggle changes the summary cards, concentration, leaderboards and
   player lookup. */
function applyMode(){
  computeWarFields(ALL_WARS);
  WARS = ALL_WARS.slice();
  MAND_WARS = ALL_WARS.filter(function(w){return w._mandatory;});
  PLAYERS = aggregateOver(WARS);
  MAND_PLAYERS = aggregateOver(MAND_WARS);
  renderOverview();
  renderWars();
  var pq=document.getElementById('pSearch'); if(pq){renderResults(pq.value.trim().toLowerCase());}
  if(OPEN_PID!=null && PLAYERS[OPEN_PID]){openPlayer(OPEN_PID,true);}
}

function computeCurrentRoster(){
  CURRENT_IDS={};
  if(!ALL_WARS.length)return;
  ALL_WARS[ALL_WARS.length-1].members.forEach(function(m){CURRENT_IDS[m.id]=true;});
}
function isLeaver(id){return !CURRENT_IDS[id];}

/* ---------- aggregation ---------- */
/* Per-war intrinsic fields, computed over every war so all-wars charts always work. */
function computeWarFields(warSet){
  warSet.forEach(function(war){
    war._fighters=war.members.filter(function(m){return m.hits>0;});
    var fh=war._fighters.map(function(m){return m.hits;});
    var fr=war._fighters.map(function(m){return m.respect;});
    war._avgHits=mean(fh);
    war._avgRespect=mean(fr);
    war._avgRph=sum(fr)/(sum(fh)||1);
    war._participation=war.members.length?war._fighters.length/war.members.length:0;
    var ranked=war.members.slice().sort(function(a,b){return b.respect-a.respect;});
    war._rankById={};
    ranked.forEach(function(m,i){war._rankById[m.id]=i+1;});
    war._size=war.members.length;
    war._totalRespect=sum(war.members.map(function(m){return m.respect;}));
  });
}

/* Build a player map over a chosen set of wars. */
function aggregateOver(warSet){
  var P={};
  warSet.forEach(function(war){
    war.members.forEach(function(m){
      var p=P[m.id]||(P[m.id]={id:m.id,name:m.name,level:m.level,warsPresent:0,warsFought:0,totalHits:0,totalRespect:0,history:[]});
      p.name=m.name; p.level=m.level;
      p.warsPresent++;
      if(m.hits>0)p.warsFought++;
      p.totalHits+=m.hits;
      p.totalRespect+=m.respect;
      p.history.push({warId:war.warId,start:war.start,opponent:war.opponent,result:war.result,mandatory:war._mandatory,hits:m.hits,respect:m.respect,rank:war._rankById[m.id],size:war._size,facAvgHits:war._avgHits,facAvgRespect:war._avgRespect,facAvgRph:war._avgRph});
    });
  });
  Object.keys(P).forEach(function(id){
    var p=P[id];
    p.participation=p.warsPresent?p.warsFought/p.warsPresent:0;
    p.avgHits=p.warsPresent?p.totalHits/p.warsPresent:0;
    p.avgRespect=p.warsPresent?p.totalRespect/p.warsPresent:0;
    p.avgRph=p.totalHits?p.totalRespect/p.totalHits:0;
    p.hitsPerFought=p.warsFought?p.totalHits/p.warsFought:0;
    p.respPerFought=p.warsFought?p.totalRespect/p.warsFought:0;
    p.history.sort(function(a,b){return (a.start||a.warId)-(b.start||b.warId);});
    var fought=p.history.filter(function(h){return h.hits>0;});
    p.aboveHits=fought.length?fought.filter(function(h){return h.hits>h.facAvgHits;}).length/fought.length:null;
    p.aboveResp=fought.length?fought.filter(function(h){return h.respect>h.facAvgRespect;}).length/fought.length:null;
  });
  return P;
}

function factionBenchmarks(map){
  map=map||PLAYERS;
  var roster=rosterPlayers(map).filter(function(p){return p.warsPresent>0;});
  return {
    participation:mean(roster.map(function(p){return p.participation;})),
    rph:(function(){var h=sum(roster.map(function(p){return p.totalHits;}));return h?sum(roster.map(function(p){return p.totalRespect;}))/h:0;})(),
    avgHits:mean(roster.map(function(p){return p.avgHits;}))
  };
}
function rosterPlayers(map){map=map||PLAYERS;return Object.keys(map).map(function(id){return map[id];}).filter(function(p){return !isLeaver(p.id);});}

/* ---------- helpers ---------- */
function sum(a){return a.reduce(function(x,y){return x+y;},0);}
function mean(a){return a.length?sum(a)/a.length:0;}
function pct(x){return Math.round(x*100);}
function fmt(n,d){if(n==null||isNaN(n))return '-';return Number(n).toLocaleString('en-GB',{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function round1(n){return Math.round(n*10)/10;}
function round2(n){return Math.round(n*100)/100;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function warLabel(w){var d=w.start?new Date(w.start):null;var when=d?d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}):('#'+w.warId);return w.opponent+' '+when;}
function dateLong(ts){return ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'?';}

/* ---------- Chart.js theme ---------- */
var GRID='#2a271f', TICK='#988f7c';
Chart.defaults.font.family="Inter, sans-serif";
function tip(){return {backgroundColor:'#0c0b08',borderColor:'#332f26',borderWidth:1,titleColor:'#f1ede4',bodyColor:'#cfc7b5',padding:10,cornerRadius:6,displayColors:true,boxWidth:10,boxHeight:10};}
function axis(title,o){o=o||{};var t=title?{display:true,text:title,color:TICK,font:{size:11}}:{display:false};return Object.assign({grid:{color:GRID},ticks:{color:TICK,font:{size:10}},title:t},o);}
function baseScales(xTitle,yTitle,yo,xo){
  var y=axis(yTitle,Object.assign({beginAtZero:true},yo||{}));
  var x=axis(xTitle,Object.assign({ticks:{color:TICK,font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:12}},xo||{}));
  return {x:x,y:y};
}
function lineOpts(scales,extra){return {responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:Object.assign({legend:{display:false},tooltip:tip()},extra||{}),scales:scales};}
function barOpts(scales,extra){return {responsive:true,maintainAspectRatio:false,plugins:Object.assign({legend:{display:false},tooltip:tip()},extra||{}),scales:scales};}
var GOLD='#ffd700', GOLDFILL='#ffd70022';
function goldLine(data){return {data:data,borderColor:GOLD,backgroundColor:GOLDFILL,tension:.25,borderWidth:2,pointRadius:2.5,pointHoverRadius:5,pointBackgroundColor:GOLD,fill:false,spanGaps:true};}

/* ---------- overview ---------- */
function renderOverview(){
  var v=document.getElementById('view-overview');
  ['rank','part','resp','wl','concHits','concResp','quad'].forEach(function(k){if(charts[k]){try{charts[k].destroy();}catch(e){}delete charts[k];}});
  if(!WARS.length){v.innerHTML='<div class="empty">No wars in the data.</div>';return;}

  var wins=WARS.filter(function(w){return w.result==='Won';}).length;
  var losses=WARS.filter(function(w){return w.result==='Lost';}).length;
  var winRate=(wins+losses)?pct(wins/(wins+losses)):0;
  var currentRank=WARS[WARS.length-1].rankAfter||'-';
  var facPart=pct(mean(WARS.map(function(w){return w._participation;})));
  var totalHits=sum(WARS.map(function(w){return sum(w.members.map(function(m){return m.hits;}));}));
  var totalResp=sum(WARS.map(function(w){return w._totalRespect;}));
  var modeNote='all wars';

  v.innerHTML=
    cardsBlock([
      card('Wars logged',fmt(WARS.length),modeNote,true),
      card('Win rate',winRate+'%',wins+'W &middot; '+losses+'L'),
      card('Current rank',currentRank,null,true),
      card('Avg participation',facPart+'%','fighters per roster, per war'),
      card('Total hits',fmt(totalHits)),
      card('Total respect',fmt(totalResp),null,true),
      card('Members now',fmt(Object.keys(CURRENT_IDS).length),'latest roster')
    ])+
    '<div class="grid charts">'+
      panel('wide','War record','Every war, oldest to newest. Click a box to open that war.',
        '<div class="legend"><span><i class="sw win"></i> Won</span><span><i class="sw loss"></i> Lost</span><span><i class="sw opt"></i> Optional</span></div><div class="form-strip" id="formStrip"></div>')+
      panel('','Rank over time','Faction rank after each war.','<div class="chartbox"><canvas id="cRank"></canvas></div>')+
      panel('','Participation per war','Share of the roster that put in at least one hit.','<div class="chartbox"><canvas id="cPart"></canvas></div>')+
      panel('','Respect per war','Total respect the faction earned each war.','<div class="chartbox"><canvas id="cResp"></canvas></div>')+
      panel('','Participation: wins vs losses','Average turnout in wars won against wars lost.','<div class="chartbox"><canvas id="cWL"></canvas></div>')+
      panel('','Hit concentration','Members ranked by hits, split into groups. Each bar is that group\'s share of all hits. Even spread means a bar roughly matches its group size; a tall top bar means a few carry it.','<div class="chartbox"><canvas id="cHistHits"></canvas></div>')+
      panel('','Respect concentration','Same, by respect earned.','<div class="chartbox"><canvas id="cHistResp"></canvas></div>')+
    '</div>'+
    '<div class="grid charts" style="margin-top:16px">'+
      panel('wide','Not pulling their weight','Mandatory wars only, so sitting out an optional war is never held against anyone. Weakest turnout first. The 2x2 places each member by hits and turnout against the faction average.','<div class="slack-wrap"><div class="slack-table" id="lbSlack"></div><div class="slack-quad" id="slackQuad"><div class="chartbox" style="height:340px"><canvas id="cQuad"></canvas></div><p class="note" id="quadNote"></p></div></div>')+
    '</div>'+
    '<div class="grid charts" style="margin-top:16px">'+
      panel('','Best participation','Wars fought against wars present. Minimum 10 wars present.','<div id="lbPart"></div>')+
      panel('','Most wars fought','Count of wars with at least one hit.','<div id="lbWars"></div>')+

    '</div>';

  drawFormStrip();

function bandedShares(values){
  var sorted=values.slice().sort(function(a,b){return b-a;});
  var n=sorted.length, grand=sum(sorted)||1;
  var fr=[0,0.01,0.05,0.10,0.25,0.50,1.00];
  var labels=['Top 1%','1-5%','5-10%','10-25%','25-50%','Bottom 50%'];
  var cut=fr.map(function(f){return Math.round(n*f);});
  for(var i=1;i<cut.length;i++){if(cut[i]<cut[i-1])cut[i]=cut[i-1];}
  cut[cut.length-1]=n;
  var shares=[];
  for(var b=0;b<labels.length;b++){
    var s=0; for(var k=cut[b];k<cut[b+1];k++)s+=sorted[k];
    shares.push(round1(s/grand*100));
  }
  return {labels:labels,shares:shares};
}
function drawConcentration(){

  Object.keys(PLAYERS).forEach(function(id){
    var p=PLAYERS[id];
    if(p.totalHits>0)hitTotals.push(p.totalHits);
    if(p.totalRespect>0)respTotals.push(p.totalRespect);
  });
  var hb=bandedShares(hitTotals);
  charts.concHits=new Chart(document.getElementById('cHistHits'),{type:'bar',
    data:{labels:hb.labels,datasets:[{data:hb.shares,backgroundColor:'#ffd70099',borderColor:GOLD,borderWidth:1}]},
    options:barOpts(baseScales('Member group, top hitters first','Share of all hits %',{ticks:{color:TICK,font:{size:10},callback:function(v){return v+'%';}}},{ticks:{color:TICK,font:{size:10},maxRotation:0,autoSkip:false}}),
      {tooltip:Object.assign(tip(),{callbacks:{label:function(c){return c.parsed.y+'% of all hits';}}})})});
  var rb=bandedShares(respTotals);
  charts.concResp=new Chart(document.getElementById('cHistResp'),{type:'bar',
    data:{labels:rb.labels,datasets:[{data:rb.shares,backgroundColor:'#ffd70099',borderColor:GOLD,borderWidth:1}]},
    options:barOpts(baseScales('Member group, top earners first','Share of all respect %',{ticks:{color:TICK,font:{size:10},callback:function(v){return v+'%';}}},{ticks:{color:TICK,font:{size:10},maxRotation:0,autoSkip:false}}),
      {tooltip:Object.assign(tip(),{callbacks:{label:function(c){return c.parsed.y+'% of all respect';}}})})});
}

function drawQuadrant(){
  var elig=rosterPlayers(MAND_PLAYERS).filter(function(p){return p.warsPresent>0;});
  var avgHitsLine=mean(elig.map(function(p){return p.avgHits;}));
  var avgPartLine=mean(elig.map(function(p){return p.participation;}));
  document.getElementById('quadNote').innerHTML='Lines are the faction average for each axis. '+
    '<span style="color:#5fb87a">carrying</span> &middot; <span style="color:#e0a93b">soft</span> &middot; '+
    '<span style="color:#5a9a92">hits but absent</span> &middot; <span style="color:#d8584e">slacking</span>';
  var pts=[], colours=[];
  elig.forEach(function(p){
    var hi=p.avgHits>=avgHitsLine, hp=p.participation>=avgPartLine;
    var col = hi&&hp?'#5fb87a':(!hi&&hp?'#e0a93b':(hi&&!hp?'#5a9a92':'#d8584e'));
    pts.push({x:round1(p.avgHits),y:pct(p.participation),name:p.name,id:p.id});
    colours.push(col);
  });
  charts.quad=new Chart(document.getElementById('cQuad'),{type:'scatter',
    data:{datasets:[{data:pts,backgroundColor:colours,borderColor:colours,pointRadius:5,pointHoverRadius:8}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:Object.assign(tip(),{callbacks:{label:function(c){var r=c.raw;return r.name+': '+r.x+' hits/war, '+r.y+'% turnout';}}})},
      scales:{
        x:axis('Avg hits per war',{beginAtZero:true}),
        y:axis('Participation %',{beginAtZero:true,max:100,ticks:{color:TICK,font:{size:10},callback:function(v){return v+'%';}}})
      }},
    plugins:[quadLines(avgHitsLine,avgPartLine*100)]});
}
function quadLines(xLine,yLine){
  return {id:'quadLines',beforeDatasetsDraw:function(chart){
    var ctx=chart.ctx, xa=chart.scales.x, ya=chart.scales.y;
    var px=xa.getPixelForValue(xLine), py=ya.getPixelForValue(yLine);
    ctx.save();
    ctx.strokeStyle='#988f7c'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(px,ya.top); ctx.lineTo(px,ya.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xa.left,py); ctx.lineTo(xa.right,py); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#6b6353'; ctx.font='11px Inter'; ctx.textBaseline='top';
    ctx.fillText('carrying',xa.right-58,ya.top+4);
    ctx.fillText('soft',xa.left+4,ya.top+4);
    ctx.textBaseline='bottom';
    ctx.fillText('hits, absent',xa.right-72,ya.bottom-4);
    ctx.fillText('slacking',xa.left+4,ya.bottom-4);
    ctx.restore();
  }};
}

function renderSlackers(){
  var bench=factionBenchmarks(MAND_PLAYERS);
  var rows=rosterPlayers(MAND_PLAYERS).slice().sort(function(a,b){
    if(a.participation!==b.participation)return a.participation-b.participation;
    return a.avgHits-b.avgHits;
  });
  board('lbSlack',rows,[
    {h:'Player',f:nameCell},
    {h:'Part.',n:true,f:function(p){return belowCell(pct(p.participation)+'%',p.participation<bench.participation);}},
    {h:'Hits/fought',n:true,f:function(p){return p.warsFought?fmt(p.hitsPerFought,1):'-';}},
    {h:'Resp/fought',n:true,f:function(p){return p.warsFought?fmt(p.respPerFought,1):'-';}},
    {h:'Wars',n:true,f:function(p){return p.warsFought+'/'+p.warsPresent;}}]);
}
function belowCell(text,isBelow){return isBelow?'<span class="below">'+text+'</span>':text;}

function by(key,desc){return function(a,b){return desc?b[key]-a[key]:a[key]-b[key];};}
function nameCell(p){return '<span class="'+(isLeaver(p.id)?'pname leaver':'pname')+'" data-pid="'+p.id+'">'+escapeHtml(p.name)+'</span>';}

function board(elId,rows,cols){

function renderRows(rows,cols,offset){

function openPlayer(id,noTab){
  if(!noTab)setTab('players');
  OPEN_PID=id;
  var map=(PLAYER_MODE==='mandatory')?MAND_PLAYERS:PLAYERS;
  var p=map[id];
  var bench=factionBenchmarks(map);
  var panelEl=document.getElementById('playerPanel');
  var head='<div class="player-head"><span class="pn">'+escapeHtml((p||PLAYERS[id]||{name:''}).name)+(isLeaver(id)?' <span class="meta">(left)</span>':'')+'</span><span class="meta mono">ID '+id+'</span>'+
    '<div class="modeswitch" id="pMode"><button data-mode="all"'+(PLAYER_MODE==='all'?' class="on"':'')+'>All wars</button><button data-mode="mandatory"'+(PLAYER_MODE==='mandatory'?' class="on"':'')+'>Mandatory only</button></div></div>';
  if(!p){
    panelEl.innerHTML=head+'<div class="empty">No mandatory wars on record for this member.</div>';
    wirePlayerMode(id);
    return;
  }
  var hist=p.history.slice().sort(function(a,b){return (a.start||a.warId)-(b.start||b.warId);});

  panelEl.innerHTML=
    head+
    cardsBlock([
      card('Wars present',p.warsPresent),
      card('Wars fought',p.warsFought,null,true),
      card('Participation',pct(p.participation)+'%','<b>Faction '+pct(bench.participation)+'%</b> &middot; '+p.warsFought+'/'+p.warsPresent+' wars'),
      card('Current level',p.level),
      card('Avg respect / hit',fmt(p.avgRph,2),'<b>Faction '+fmt(bench.rph,2)+'</b>',true),
      card('Hits above avg',p.aboveHits==null?'-':pct(p.aboveHits)+'%','of fought wars beat that war'),
      card('Respect above avg',p.aboveResp==null?'-':pct(p.aboveResp)+'%','of fought wars beat that war')
    ])+
    '<div class="grid charts">'+
      panel('','Hits per war','Their hits each war, against the average fighter that war.','<div class="chartbox"><canvas id="pcHits"></canvas></div>')+
      panel('','Respect per war','Their respect each war, against the average fighter that war.','<div class="chartbox"><canvas id="pcResp"></canvas></div>')+
      panel('','Respect per hit','Hit quality each war, against the faction average.','<div class="chartbox"><canvas id="pcRph"></canvas></div>')+
      panel('','Standing','Their rank in the faction each war. Higher is better.','<div class="chartbox"><canvas id="pcRank"></canvas></div>')+
      panel('wide','Turnout','One block per war, oldest to newest, filled when they fought.','<div class="strip-row" id="pStrip"></div>')+
    '</div>';

  var labels=hist.map(labelFor);
  destroyPlayerCharts();
  charts.pcHits=vsChart('pcHits',labels,hist.map(function(h){return h.hits;}),hist.map(function(h){return round1(h.facAvgHits);}),'Hits','Hits');
  charts.pcResp=vsChart('pcResp',labels,hist.map(function(h){return round1(h.respect);}),hist.map(function(h){return round1(h.facAvgRespect);}),'Respect','Respect');
  charts.pcRph=vsChart('pcRph',labels,hist.map(function(h){return h.hits?round2(h.respect/h.hits):null;}),hist.map(function(h){return round2(h.facAvgRph);}),'Resp/hit','Respect per hit');
  charts.pcRank=new Chart(document.getElementById('pcRank'),{type:'line',
    data:{labels:labels,datasets:[goldLine(hist.map(function(h){return h.rank;}))]},
    options:lineOpts(baseScales('War','Faction rank',{reverse:true,beginAtZero:false,ticks:{color:TICK,font:{size:10},precision:0}}),
      {tooltip:Object.assign(tip(),{callbacks:{label:function(c){return 'Rank '+c.parsed.y;}}})})});

  document.getElementById('pStrip').innerHTML=hist.map(function(h){return '<div class="pcell'+(h.hits>0?' on':'')+'" data-tip="'+escapeHtml(labelFor(h))+'|'+(h.hits>0?(h.hits+' hits'):'no-show')+'"></div>';}).join('');
  wirePlayerMode(id);
  if(!noTab)panelEl.scrollIntoView({behavior:'smooth',block:'start'});
}
function wirePlayerMode(id){
  var box=document.getElementById('pMode'); if(!box)return;
  box.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click',function(){
      var m=b.getAttribute('data-mode');
      if(m===PLAYER_MODE)return;
      PLAYER_MODE=m;
      openPlayer(id,true);
    });
  });
}
function labelFor(h){var d=h.start?new Date(h.start):null;var when=d?d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}):('#'+h.warId);return h.opponent+' '+when;}
function vsChart(id,labels,mine,fac,name,yTitle){
  return new Chart(document.getElementById(id),{type:'line',
    data:{labels:labels,datasets:[
      Object.assign(goldLine(mine),{label:name}),
      {label:'Faction avg',data:fac,borderColor:'#988f7c',borderDash:[5,4],tension:.25,pointRadius:0,borderWidth:1.5,fill:false,spanGaps:true}
    ]},
    options:lineOpts(baseScales('War',yTitle),{legend:{display:true,labels:{color:TICK,boxWidth:12,font:{size:11}}}})});
}
function destroyPlayerCharts(){['pcHits','pcResp','pcRph','pcRank'].forEach(function(k){if(charts[k]){try{charts[k].destroy();}catch(e){}delete charts[k];}});}

/* ---------- rank ladder ---------- */
var RANK_ORDER=['Unranked','Bronze III','Bronze II','Bronze I','Silver III','Silver II','Silver I','Gold III','Gold II','Gold I','Platinum III','Platinum II','Platinum I','Diamond III','Diamond II','Diamond I','Master'];
function rankToNum(r){if(!r)return null;var i=RANK_ORDER.indexOf(r);if(i>-1)return i;for(var k=0;k<RANK_ORDER.length;k++){if(RANK_ORDER[k].indexOf(r)===0)return k;}return null;}
function numToRank(n){var i=Math.round(n);return (i>=0&&i<RANK_ORDER.length)?RANK_ORDER[i]:'';}

var ADMIN_UID=null, ADMIN_KEY='resWarAdmin';
function apiUrl(){return (DATA_URL&&DATA_URL.indexOf('http')===0)?DATA_URL:'./resilience-wars.json';}
function loadStoredAdmin(){try{return localStorage.getItem(ADMIN_KEY);}catch(e){return null;}}
function storeAdmin(v){try{localStorage.setItem(ADMIN_KEY,v);}catch(e){}}
function clearStoredAdmin(){try{localStorage.removeItem(ADMIN_KEY);}catch(e){}}

function verifyAdmin(pw,cb,errcb){
  fetch(apiUrl()+'?action=admincheck&uid='+encodeURIComponent(pw),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(j){cb(!!(j&&j.admin));})
    .catch(function(){(errcb||function(){cb(false);})();});
}

function buildManage(){
  var v=document.getElementById('view-manage');
  if(ADMIN_UID){renderManage(v);return;}
  var stored=loadStoredAdmin();
  if(stored){
    v.innerHTML='<div class="panel" style="max-width:460px"><h3>Manage wars</h3><p class="note">Checking saved login&hellip;</p></div>';
    verifyAdmin(stored,function(ok){if(ok){ADMIN_UID=stored;renderManage(v);}else{clearStoredAdmin();showAdminLogin(v);}},function(){showAdminLogin(v);});
    return;
  }
  showAdminLogin(v);
}

function showAdminLogin(v){
  v.innerHTML='<div class="panel" style="max-width:460px"><h3>Manage wars</h3>'+
    '<p class="cap">Admin only. Enter the password to mark wars mandatory or optional.</p>'+
    '<div class="lookup"><input id="adminId" type="password" placeholder="Password" autocomplete="off"></div>'+
    '<button class="unlock-btn" id="adminUnlock">Unlock</button>'+
    '<p class="note" id="adminMsg"></p></div>';
  var btn=document.getElementById('adminUnlock'), inp=document.getElementById('adminId');
  function tryUnlock(){
    var pw=inp.value.trim(); if(!pw)return;
    document.getElementById('adminMsg').textContent='Checking&hellip;';
    verifyAdmin(pw,function(ok){
      if(ok){ADMIN_UID=pw;storeAdmin(pw);renderManage(v);}
      else{document.getElementById('adminMsg').textContent='Wrong password.';}
    },function(){document.getElementById('adminMsg').textContent='Could not reach the data source.';});
  }
  btn.addEventListener('click',tryUnlock);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});
}

function renderManage(v){
  var rows=ALL_WARS.slice().reverse();
  v.innerHTML='<div class="panel"><h3>Manage wars <a class="signout" id="adminSignout">sign out</a></h3>'+
    '<p class="cap">Mark a war optional to drop it from the Mandatory only view. Changes save straight away and the dashboard recomputes.</p>'+
    '<div class="manage-list" id="manageList">'+
      rows.map(function(w){
        var res=w.result==='Won'?'<span style="color:var(--win)">Won</span>':(w.result==='Lost'?'<span style="color:var(--loss)">Lost</span>':w.result);
        return '<div class="manage-row" data-war="'+w.warId+'">'+
          '<div class="ml-name">'+escapeHtml(warLabel(w))+'</div>'+
          '<div class="ml-res">'+res+'</div>'+
          '<button class="toggle '+(w._mandatory?'on':'')+'" data-war="'+w.warId+'" role="switch" aria-checked="'+(w._mandatory?'true':'false')+'"><span class="knob"></span><span class="tlabel">'+(w._mandatory?'Mandatory':'Optional')+'</span></button>'+
        '</div>';
      }).join('')+
    '</div><p class="note" id="manageMsg"></p></div>';

  document.getElementById('adminSignout').addEventListener('click',function(){ADMIN_UID=null;clearStoredAdmin();buildManage();});
  document.getElementById('manageList').querySelectorAll('.toggle').forEach(function(b){
    b.addEventListener('click',function(){toggleWar(Number(b.getAttribute('data-war')),b);});
  });
}

function toggleWar(warId,btn){
  var w=ALL_WARS.filter(function(x){return x.warId===warId;})[0]; if(!w)return;
  var next=!w._mandatory;
  btn.disabled=true;
  document.getElementById('manageMsg').textContent='Saving...';
  fetch(apiUrl()+'?action=set&uid='+encodeURIComponent(ADMIN_UID)+'&warId='+warId+'&mandatory='+next,{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(j){
      btn.disabled=false;
      if(j&&j.ok){
        w.mandatory=next; w._mandatory=next;
        btn.classList.toggle('on',next);
        btn.setAttribute('aria-checked',next?'true':'false');
        btn.querySelector('.tlabel').textContent=next?'Mandatory':'Optional';
        document.getElementById('manageMsg').textContent='Saved.';
        applyMode();
      } else {
        document.getElementById('manageMsg').textContent='Save failed: '+((j&&j.error)||'unknown');
      }
    })
    .catch(function(){btn.disabled=false;document.getElementById('manageMsg').textContent='Could not reach the data source.';});
}

/* ---------- tabs + delegated events ---------- */
function setTab(name){
  document.querySelectorAll('nav.tabs button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===name);});
  document.querySelectorAll('section.view').forEach(function(s){s.classList.toggle('active',s.id==='view-'+name);});
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('nav.tabs button').forEach(function(b){b.addEventListener('click',function(){setTab(b.getAttribute('data-tab'));});});

document.addEventListener('click',function(e){
  var ex=e.target.closest('[data-expand]');
  if(ex){var el=document.getElementById(ex.getAttribute('data-expand'));el.querySelector('tbody').innerHTML=renderRows(el._rows,el._cols,0);ex.remove();return;}
  var fc=e.target.closest('.form-cell');
  if(fc){var wid=Number(fc.getAttribute('data-war'));setTab('wars');var sel=document.getElementById('warPick');if(sel){sel.value=wid;showWar(wid);}return;}
  var nm=e.target.closest('.pname');
  if(nm){openPlayer(Number(nm.getAttribute('data-pid')));}
});

/* floating tooltip for the form strip and turnout strip */
var floatTip=document.getElementById('floatTip');
document.addEventListener('mouseover',function(e){
  var t=e.target.closest('[data-tip]'); if(!t)return;
  var parts=t.getAttribute('data-tip').split('|');
  floatTip.innerHTML='<div>'+escapeHtml(parts[0])+'</div>'+(parts[1]?'<div class="t">'+escapeHtml(parts[1])+'</div>':'');
  floatTip.style.opacity='1';
});
document.addEventListener('mousemove',function(e){
  if(floatTip.style.opacity!=='1')return;
  var x=e.clientX+14, y=e.clientY+14;
  if(x+250>window.innerWidth)x=e.clientX-250;
  floatTip.style.left=x+'px'; floatTip.style.top=y+'px';
});
document.addEventListener('mouseout',function(e){var t=e.target.closest('[data-tip]');if(t)floatTip.style.opacity='0';});

boot();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>War Performance Capture</title>
<style>
  :root {
    --bg: #14171c;
    --panel: #1c2026;
    --border: #2c323b;
    --text: #e6e8eb;
    --muted: #8a929c;
    --accent: #3fae6b;
    --danger: #d36b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem 1rem;
    background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .card {
    max-width: 520px; margin: 0 auto;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.75rem;
  }
  h1 { margin: 0 0 0.25rem; font-size: 1.25rem; }
  p.sub { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.9rem; }
  label { display: block; margin: 1rem 0 0.4rem; font-size: 0.85rem; color: var(--muted); }
  select, input {
    width: 100%; padding: 0.6rem 0.7rem;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem;
  }
  .buttons { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  button {
    flex: 1; padding: 0.7rem; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text);
    font-size: 0.9rem; cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    margin-top: 1.25rem; padding: 0.75rem 0.9rem;
    border-radius: 6px; font-size: 0.9rem; display: none;
    white-space: pre-wrap;
  }
  #status.show { display: block; }
  #status.ok { background: rgba(63,174,107,0.12); border: 1px solid var(--accent); }
  #status.err { background: rgba(211,107,107,0.12); border: 1px solid var(--danger); }
</style>
</head>
<body>
<div class="card">
  <h1>War Performance Capture</h1>
  <p class="sub">Resilience &middot; one capture per phase, written to this sheet.</p>

  <label for="war">War</label>
  <select id="war"><option>Loading wars&hellip;</option></select>

  <label for="target">Target respect per person</label>
  <input id="target" type="number" inputmode="numeric" placeholder="e.g. 159">

  <label for="rate">Pay per respect ($)</label>
  <input id="rate" type="number" inputmode="numeric" placeholder="Can leave blank until the rate is known">

  <div class="buttons">
    <button id="btn-snapshot">Capture 24h snapshot</button>
    <button id="btn-cutoff">Set hits cutoff &amp; capture war</button>
    <button id="btn-complete">Generate payout</button>
  </div>

  <div id="cutoff-choice" style="display:none;margin-top:1rem;padding:0.9rem;border:1px solid var(--border);border-radius:6px;">
    <p style="margin:0 0 0.6rem;font-size:0.9rem;">When should hits stop counting?</p>
    <div class="buttons" style="margin-top:0;">
      <button id="cutoff-now" type="button">Record now</button>
      <button id="cutoff-pick" type="button">Set a time</button>
    </div>
    <div id="cutoff-time-wrap" style="display:none;margin-top:0.8rem;">
      <label for="cutoff-time" style="margin-top:0;">Cutoff time (Torn / UTC)</label>
      <input id="cutoff-time" type="datetime-local" step="1">
      <div class="buttons" style="margin-top:0.6rem;">
        <button id="cutoff-confirm" type="button">Confirm time</button>
        <button id="cutoff-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <p style="margin-top:1.25rem;font-size:0.85rem;">
    <a href="https://docs.google.com/spreadsheets/d/1kon4IPqQXGDQzA3zbZJyvuWx99DuvFnC3w3xKu7Kb6w/edit"
       target="_blank" rel="noopener" style="color:var(--accent);">Open the war pay spreadsheet &rarr;</a>
  </p>
</div>

<script>
// Paste the deployed Apps Script web app URL here.
const API_URL = 'https://script.google.com/macros/s/AKfycby6OTLbQnbrWhQGm5S0LCri0M3yF_LBVFzfh08FkKkipFCw8zUx8DiUpUJriMTyxjHCjw/exec';

const $war = document.getElementById('war');
const $target = document.getElementById('target');
const $snap = document.getElementById('btn-snapshot');
const $cutoff = document.getElementById('btn-cutoff');
const $complete = document.getElementById('btn-complete');
const $rate = document.getElementById('rate');
const $cutoffChoice = document.getElementById('cutoff-choice');
const $cutoffNow = document.getElementById('cutoff-now');
const $cutoffPick = document.getElementById('cutoff-pick');
const $cutoffTimeWrap = document.getElementById('cutoff-time-wrap');
const $cutoffTime = document.getElementById('cutoff-time');
const $cutoffConfirm = document.getElementById('cutoff-confirm');
const $cutoffCancel = document.getElementById('cutoff-cancel');
const $status = document.getElementById('status');
let warsById = {};

function setStatus(msg, kind) {
  $status.textContent = msg;
  $status.className = 'show ' + kind;
}

function lockButtons(locked) {
  $snap.disabled = locked;
  $cutoff.disabled = locked;
  $complete.disabled = locked;
}

async function loadWars() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    $war.innerHTML = '';
    if (!data.wars.length) {
      $war.innerHTML = '<option>No wars found</option>';
      return;
    }
    warsById = {};
    data.wars.forEach(w => {
      warsById[w.id] = w;
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = 'vs ' + w.opponent + (w.active ? ' (active)' : ' (ended)');
      $war.appendChild(opt);
    });
    reflectWarState();
  } catch (err) {
    $war.innerHTML = '<option>Failed to load</option>';
    setStatus('Could not load wars: ' + err.message, 'err');
  }
}

// Buttons are always clickable. The backend is the source of truth on press:
// it knows the real war state from the API call and returns a clear message
// if an action is not allowed yet.
function reflectWarState() { /* no-op: state is decided server-side on press */ }

async function capture(mode, cutoffEpoch) {
  const warId = $war.value;
  const target = $target.value;
  const payRate = $rate.value;
  if (!warId) { setStatus('Select a war first.', 'err'); return; }

  lockButtons(true);
  setStatus('Working\u2026 this can take a few seconds.', 'ok');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ mode: mode, warId: warId, target: target, payRate: payRate, cutoffEpoch: cutoffEpoch || '' })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    const s = data.summary;
    if (s.stage === 'Cutoff') {
      setStatus('Hits cutoff set at ' + s.cutoff + ' for "' + s.tab + '".\n' +
        'Full war respect captured up to the cutoff for ' + s.members + ' members.\n' +
        'Hits after the cutoff are excluded.', 'ok');
    } else if (s.stage === 'Pay') {
      setStatus('Payout links written for ' + s.members + ' members in "' + s.tab + '".', 'ok');
    } else {
      setStatus(s.stage + ' written to "' + s.tab + '".\n' +
        'Opponent: ' + s.opponent + '\nMembers: ' + s.members, 'ok');
    }
    loadWars();
    hideCutoffChoice();
  } catch (err) {
    setStatus(err.message, 'err');
  } finally {
    lockButtons(false);
  }
}

$war.addEventListener('change', () => { reflectWarState(); hideCutoffChoice(); });

// Snapshot: in-page overwrite warning shown in the status line, second press confirms.
let snapArmed = false;
$snap.addEventListener('click', () => {
  const w = warsById[$war.value];
  if (w && w.hasSnapshot && !snapArmed) {
    snapArmed = true;
    setStatus('This will overwrite the existing 24h snapshot. Press Get 24h Snapshot again to confirm.', 'err');
    return;
  }
  snapArmed = false;
  capture('snapshot');
});

// Stop Hits: open the in-page choice (Record now / Set a time).
function hideCutoffChoice() {
  $cutoffChoice.style.display = 'none';
  $cutoffTimeWrap.style.display = 'none';
}
$cutoff.addEventListener('click', () => {
  $cutoffChoice.style.display = 'block';
  $cutoffTimeWrap.style.display = 'none';
});
$cutoffNow.addEventListener('click', () => capture('cutoff'));
$cutoffPick.addEventListener('click', () => {
  $cutoffTimeWrap.style.display = 'block';
});
$cutoffCancel.addEventListener('click', hideCutoffChoice);
$cutoffConfirm.addEventListener('click', () => {
  if (!$cutoffTime.value) { setStatus('Enter a cutoff time first.', 'err'); return; }
  const epoch = Math.floor(Date.parse($cutoffTime.value + 'Z') / 1000); // read as Torn/UTC
  if (isNaN(epoch)) { setStatus('That cutoff time is not valid.', 'err'); return; }
  capture('cutoff', epoch);
});

$complete.addEventListener('click', () => capture('pay'));

loadWars();
</script>
</body>
</html>

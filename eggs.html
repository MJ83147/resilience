<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Easter Egg Hunt Leaderboard!</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --primary-color: var(--green);
      --primary-light: #4CAF50;
      --primary-lightest: var(--green-light);
      --border-radius: 8px;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100vh;
      font-family: var(--font-family);
      background-color: var(--gray-100);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: 100%;
      padding: 12px;
    }

    .eggs-header {
      background: var(--white);
      padding: 16px;
      border-radius: var(--border-radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .page-title {
      margin: 0;
      color: var(--green);
      font-size: 24px;
      font-weight: 600;
    }

    .refresh-btn {
      background-color: var(--primary-color);
      color: var(--white);
      border: none;
      border-radius: var(--border-radius);
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .refresh-btn:hover { background-color: var(--primary-light); }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .loader {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(46, 125, 50, 0.2);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s ease-in-out infinite;
      margin-left: 8px;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }

    .dashboard {
      display: flex;
      gap: 12px;
      background-color: var(--white);
      border-radius: var(--border-radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .chart-section {
      flex: 1;
      min-width: 0;
      position: relative;
      height: 400px;
    }

    .table-section {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .table-container {
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid var(--gray-300);
    }

    th {
      background-color: var(--primary-lightest);
      color: var(--primary-color);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background-color: #81C784; color: var(--white); }
    th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: 0.4; }
    th.active-sort .sort-arrow { opacity: 1; }

    tr:nth-child(even) { background-color: var(--gray-100); }

    .rank { text-align: center; font-weight: 700; }
    .top-3 { color: var(--primary-color); font-weight: 700; }
    .egg-icon { color: #ffd700; margin-right: 4px; }

    .last-updated {
      font-size: 12px;
      color: var(--text-light);
      text-align: right;
    }

    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
      }

      .chart-section {
        height: 250px;
      }

      .table-container {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Resilience Dashboard</a>
  </nav>

  <div class="container">
    <div class="eggs-header">
      <h1 class="page-title">Easter Egg Hunt Leaderboard</h1>
      <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
        <button id="refreshBtn" class="refresh-btn">Refresh Data</button>
        <div id="loader" class="loader hidden"></div>
      </div>
    </div>

    <div class="dashboard">
      <div class="chart-section">
        <canvas id="eggChart"></canvas>
      </div>

      <div class="table-section">
        <div class="table-container">
          <table id="leaderboardTable">
            <colgroup>
              <col style="width: 50px;">
              <col>
              <col style="width: 80px;">
              <col style="width: 80px;">
            </colgroup>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Name</th>
                <th class="sortable active-sort" data-sort="score" data-dir="desc">This Year <span class="sort-arrow">&#9660;</span></th>
                <th class="sortable" data-sort="total" data-dir="desc">All Time <span class="sort-arrow">&#9660;</span></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="last-updated" id="lastUpdated"></div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS1wySpxYntyGL2I7h-HLXb7EAmMzBk-yT883IY78-xDrK4JOUBli82y8sH06Jk5Y-m-_FqTT6lvSk0/pub?gid=0&single=true&output=csv';
    const TIMESTAMP_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS1wySpxYntyGL2I7h-HLXb7EAmMzBk-yT883IY78-xDrK4JOUBli82y8sH06Jk5Y-m-_FqTT6lvSk0/pub?gid=1431768491&single=true&output=csv';

    const refreshBtn = document.getElementById('refreshBtn');
    const loader = document.getElementById('loader');
    const leaderboardTable = document.getElementById('leaderboardTable');
    const lastUpdated = document.getElementById('lastUpdated');

    let currentData = [];
    let currentSort = { field: 'score', dir: 'desc' };
    let chartInstance = null;

    function formatDateTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    function parseCSV(csvText) {
      const lines = csvText.split('\n');
      const headers = lines[0].split(',');
      const nameIndex = headers.findIndex(h => h.trim().toLowerCase() === 'name');
      const scoreIndex = headers.findIndex(h => h.trim().toLowerCase() === 'score');
      const totalIndex = headers.findIndex(h => h.trim().toLowerCase() === 'total');
      const result = [];

      for (let i = 1; i < lines.length; i++) {
        const fields = lines[i].split(',');
        const name = fields[nameIndex];
        if (!name || !name.trim()) continue;
        const score = parseInt(fields[scoreIndex], 10) || 0;
        const total = parseInt(fields[totalIndex], 10) || 0;
        result.push({ name: name.trim(), score, total });
      }
      return result;
    }

    function sortData(data, field, dir) {
      return [...data].sort((a, b) => {
        const diff = b[field] - a[field];
        if (dir === 'asc') return -diff;
        return diff;
      });
    }

    function drawBarChart(data) {
      const chartData = sortData(data, 'score', 'desc').filter(d => d.score > 0).slice(0, 10);
      if (chartData.length === 0) return;

      const ctx = document.getElementById('eggChart').getContext('2d');

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: chartData.map(d => d.name),
          datasets: [{
            label: 'Eggs This Year',
            data: chartData.map(d => d.score),
            backgroundColor: '#4CAF50',
            borderColor: '#2E7D32',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1,
                precision: 0
              }
            },
            x: {
              ticks: {
                maxRotation: 45,
                minRotation: 0
              }
            }
          }
        }
      });
    }

    function displayLeaderboard(data) {
      const sorted = sortData(data, currentSort.field, currentSort.dir);
      const tbody = leaderboardTable.querySelector('tbody');
      tbody.innerHTML = '';

      sorted.forEach((entry, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="rank">${index + 1}</td>
          <td class="${index < 3 ? 'top-3' : ''}">${entry.name}</td>
          <td class="${index < 3 ? 'top-3' : ''}"><span class="egg-icon">🥚</span>${entry.score}</td>
          <td>${entry.total}</td>
        `;
        tbody.appendChild(row);
      });

      drawBarChart(data);
    }

    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        let dir = 'desc';

        if (currentSort.field === field) {
          dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
        }

        currentSort = { field, dir };

        document.querySelectorAll('th.sortable').forEach(header => {
          header.classList.remove('active-sort');
          header.querySelector('.sort-arrow').innerHTML = '&#9660;';
        });
        th.classList.add('active-sort');
        th.querySelector('.sort-arrow').innerHTML = dir === 'desc' ? '&#9660;' : '&#9650;';

        if (currentData.length > 0) {
          displayLeaderboard(currentData);
        }
      });
    });

    async function fetchData() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Loading...';
      loader.classList.remove('hidden');

      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        currentData = parseCSV(text);
        displayLeaderboard(currentData);

        const timestampRes = await fetch(TIMESTAMP_URL);
        const timestampText = await timestampRes.text();
        const timestamp = new Date(timestampText.trim());
        lastUpdated.textContent = `Last updated: ${formatDateTime(timestamp)}`;
      } catch (err) {
        console.error(err);
        lastUpdated.textContent = 'Failed to load data.';
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Refresh Data';
        loader.classList.add('hidden');
      }
    }

    refreshBtn.addEventListener('click', fetchData);
    window.addEventListener('load', fetchData);
  </script>
  <script src="theme.js"></script>
</body>
</html>

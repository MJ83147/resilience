<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xanax Runners Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .setup-section {
      background: var(--gray-100);
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .dashboard-content { display: none; }
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--gray-300);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .faction-name { font-weight: 600; color: var(--green); }
    .last-updated { font-size: 12px; color: var(--text-light); margin-left: auto; }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 1100px) {
      .summary-cards { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
    }
    .summary-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 12px;
      text-align: center;
    }
    .summary-value {
      font-size: 22px;
      font-weight: 600;
      color: var(--green);
      line-height: 1.2;
    }
    .summary-label {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .panel {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .panel-title { font-weight: 600; font-size: 15px; }
    .panel-filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .panel-filters .filter-btn { padding: 4px 10px; font-size: 12px; }

    .chart-canvas-container {
      position: relative;
      height: 320px;
      width: 100%;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Resilience Dashboard</a>
  </nav>

  <div class="container">
    <div class="header">
      <h2>Xanax Runners</h2>
    </div>

    <div class="setup-section" id="setupSection">
      <div id="loadingMessage"><span class="loading-spinner"></span> Loading data...</div>
      <div id="errorMessage" style="display: none; color: var(--red);"></div>
    </div>

    <div class="dashboard-content" id="dashboardContent">
      <div class="status-bar">
        <span class="faction-name">Resilience XR</span>
        <span class="last-updated" id="lastUpdated"></span>
      </div>

      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-value" id="kpiXanax">0</div>
          <div class="summary-label">Xanax Deposited</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="kpiReimbursed">$0</div>
          <div class="summary-label">Reimbursed to Runners</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="kpiRevenue">$0</div>
          <div class="summary-label">Sales Revenue</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="kpiProfit">$0</div>
          <div class="summary-label">Net Profit</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="kpiRunners">0</div>
          <div class="summary-label">Contributors</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="kpiMonths">0</div>
          <div class="summary-label">Months Running</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Activity Over Time</div>
          <div class="panel-filters" id="activityMetricFilter">
            <button class="filter-btn active" data-metric="tickets">Tickets</button>
            <button class="filter-btn" data-metric="xanax">Xanax</button>
            <button class="filter-btn" data-metric="reimbursed">Reimbursed</button>
          </div>
          <div class="panel-filters" id="activityRangeFilter">
            <button class="filter-btn" data-range="3">3M</button>
            <button class="filter-btn" data-range="6">6M</button>
            <button class="filter-btn active" data-range="12">12M</button>
            <button class="filter-btn" data-range="all">All</button>
          </div>
        </div>
        <div class="chart-canvas-container">
          <canvas id="activityChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="xr.js"></script>
  <script src="theme.js"></script>
</body>
</html>
